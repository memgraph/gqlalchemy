name: Publish Docs

on:
  workflow_dispatch:
  workflow_call:

jobs:
  publish-docs:
    runs-on: ["ubuntu-latest"]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pydoc-markdown==4.8.2 mkdocs==1.6.1 mkdocs-material==9.7.6

      - name: Publish docs
        run: |
          mkdocs gh-deploy --force