name: Build Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build"
        required: false
        type: string
      branch:
        description: "Branch to build"
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: "Version to build"
        required: false
        type: string
      branch:
        description: "Branch to build"
        required: false
        type: string
        
jobs:
  build-packages:
    name: Build Packages
    runs-on: ["self-hosted", "Ubuntu24.04", "X64"]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.branch }}

      - name: Override version
        if: ${{ inputs.version != '' }}
        run: |
          sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" pyproject.toml
        
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.3"

      - name: Install dependencies
        run: |
          uv sync

      - name: Build wheel
        run: |
          uv build

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages
          path: dist
          retention-days: 1

  test-wheel:
    needs: build-packages
    name: Test Wheel Package
    runs-on: ["ubuntu-latest"]
    env:
      MG_VERSION: "3.3.0"
      VM_MAX_MAP_COUNT: "262144"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.3"

      - name: Download wheel package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages
          path: dist

      - name: Create test virtual environment
        run: |
          uv venv wheel-test-venv --python ${{ matrix.python-version }}

      - name: Install Memgraph
        run: |
          mkdir /home/runner/memgraph
          curl -L https://download.memgraph.com/memgraph/v${{env.MG_VERSION}}/ubuntu-24.04/memgraph_${{env.MG_VERSION}}-1_amd64.deb --output /home/runner/memgraph/memgraph-community.deb
          sudo dpkg -i /home/runner/memgraph/memgraph-community.deb
          sudo systemctl stop memgraph
          sudo runuser -l memgraph -c '/usr/lib/memgraph/memgraph --bolt-port 7687 --bolt-session-inactivity-timeout=300 --data-directory="/var/lib/memgraph/data" --storage-properties-on-edges=true --storage-snapshot-interval-sec=0 --storage-wal-enabled=false --storage-snapshot-on-exit=false --telemetry-enabled=false --log-level=TRACE --also-log-to-stderr=true --log-file=/var/log/memgraph/memgraph-ubuntu-${{ matrix.python-version }}.log' &

      - name: Wait for Memgraph to be ready
        run: |
          echo "Waiting for Memgraph to accept Bolt connections..."
          for i in {1..60}; do
            if timeout 1 bash -c "echo > /dev/tcp/127.0.0.1/7687" 2>/dev/null; then
              echo "Memgraph is ready."
              exit 0
            fi
            echo "Waiting for Memgraph... ($i/60)"
            sleep 1
          done
          echo "Memgraph did not become ready in time."
          sudo journalctl -u memgraph --no-pager | tail -50 || true
          exit 1

      - name: Install Neo4j
        run: |
          # Using Neo4j 4.4.18 which has cgroupv2 compatibility fixes for Ubuntu 24.04
          docker run --name neo4j-test -p 7474:7474 -p 7688:7687 -d -v $HOME/neo4j/data:/data -v $HOME/neo4j/logs:/logs -v $HOME/neo4j/import:/var/lib/neo4j/import -v $HOME/neo4j/plugins:/plugins --env NEO4J_AUTH=neo4j/test neo4j:4.4.18

      - name: Wait for Neo4j to be ready
        run: |
          echo "Waiting for Neo4j to be ready..."
          for i in {1..60}; do
            # Use cypher-shell inside the container to verify Neo4j is accepting connections
            if docker exec neo4j-test cypher-shell -u neo4j -p test "RETURN 1" 2>/dev/null; then
              echo "Neo4j is ready and accepting queries!"
              break
            fi
            echo "Waiting for Neo4j... ($i/60)"
            sleep 2
          done
          # Show Neo4j logs for debugging
          echo "=== Neo4j logs ==="
          docker logs neo4j-test 2>&1 | tail -30 || true

      - name: Install wheel and dependencies (Python <= 3.12)
        if: ${{ matrix.python-version == '3.10' || matrix.python-version == '3.11' || matrix.python-version == '3.12' }}
        run: |
          source wheel-test-venv/bin/activate
          uv pip install dist/*.whl
          uv pip install pytest networkx numpy scipy
          uv pip install 'pyarrow>=16,<17'
          uv pip install pydot
          uv pip install docker
          uv pip install 'torch>=2.4.0,<=2.5.0'
          uv pip install dgl==2.4.0 -f https://data.dgl.ai/wheels/torch-2.4/repo.html --no-build-isolation
          uv pip install torch-scatter torch-sparse torch-cluster torch-spline-conv torch-geometric -f https://data.pyg.org/whl/torch-2.4.0+cpu.html --no-build-isolation
          uv pip install 'tf-keras>=2.16,<3.0'
          uv pip install 'tensorflow-gnn>=1.0.0,<2.0.0'

      - name: Install wheel and dependencies (Python >= 3.13)
        if: ${{ matrix.python-version == '3.13' || matrix.python-version == '3.14' }}
        run: |
          source wheel-test-venv/bin/activate
          # Keep TensorFlow/TF-GNN and DGL/Torch stacks off for 3.13+.
          uv pip install dist/*.whl
          uv pip install pytest networkx numpy scipy
          uv pip install 'pyarrow>=22,<24'
          uv pip install pydot
          uv pip install docker

      - name: Run Tests (Python <= 3.12)
        if: ${{ matrix.python-version == '3.10' || matrix.python-version == '3.11' || matrix.python-version == '3.12' }}
        env:
          TF_USE_LEGACY_KERAS: "1"
        run: |
          source wheel-test-venv/bin/activate
          # Create a new directory and copy tests there
          mkdir wheel_test
          cp -r tests wheel_test/
          cd wheel_test
          mkdir -p gqlalchemy/query_modules/push_streams/
          cp -v ../gqlalchemy/query_modules/push_streams/* gqlalchemy/query_modules/push_streams/
          # Run tests from this directory to ensure we use the installed package
          pytest -vvv -m "not slow and not ubuntu and not docker"

      - name: Run Tests (Python >= 3.13)
        if: ${{ matrix.python-version == '3.13' || matrix.python-version == '3.14' }}
        run: |
          source wheel-test-venv/bin/activate
          # Create a new directory and copy tests there
          mkdir wheel_test
          cp -r tests wheel_test/
          cd wheel_test
          mkdir -p gqlalchemy/query_modules/push_streams/
          cp -v ../gqlalchemy/query_modules/push_streams/* gqlalchemy/query_modules/push_streams/
          # Run tests from this directory to ensure we use the installed package
          pytest -vvv -m "not slow and not ubuntu and not docker and not tfgnn"

      - name: Upload Memgraph logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: memgraph-logs-wheel-${{ matrix.python-version }}
          path: /var/log/memgraph
          overwrite: true
