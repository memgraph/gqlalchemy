name: Create Github Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release"
        required: false
        type: string

  workflow_call:
    inputs:
      version:
        description: "Version to release"
        required: false
        type: string

jobs:
  create-github-release:
    runs-on: ["ubuntu-latest"]
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: "v${{ inputs.version }}"
          fetch-depth: 0  # Fetch all history for changelog generation
          fetch-tags: true

      - name: Get previous version
        id: get_previous_version
        run: |
          previous_version=$(git tag --sort=-version:refname | sed -n '2p')
          echo "previous_version=${previous_version}" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        run: |
          changelog=$(./scripts/get_changelog.sh "${{ steps.get_previous_version.outputs.previous_version }}" "v${{ inputs.version }}")
          changelog="## What's Changed\n${changelog}"
          changelog="${changelog}\n**Full Changelog**: https://github.com/memgraph/gqlalchemy/compare/${{ steps.get_previous_version.outputs.previous_version }}...v${{ inputs.version }}"
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo -e "$changelog" >> $GITHUB_OUTPUT
          
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        # NOTE: actions/create-release is archived/unmaintained. Pinned to its
        # last release (v1.1.4); consider replacing with `gh release create`.
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1.1.4
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
            tag_name: ${{ inputs.version }}
            release_name: "v${{ inputs.version }}"
            body: ${{ steps.changelog.outputs.CHANGELOG }}
            draft: true
            prerelease: false

  
